<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snapshot Flat File — Field Reference</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sw:272px;--sbg:#0f172a;--sfg:#94a3b8;--shover:#1e293b;
  --accent:#3b82f6;--danger:#ef4444;--warn:#f59e0b;--ok:#22c55e;
  --border:#e2e8f0;--bg:#f1f5f9;--surf:#ffffff;--text:#0f172a;--muted:#64748b;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}

/* ── Sidebar ── */
#sidebar{width:var(--sw);background:var(--sbg);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
#sb-head{padding:18px 14px 12px;border-bottom:1px solid #1e293b;}
#sb-head h1{font-size:11px;font-weight:700;color:#f1f5f9;letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px;line-height:1.4;}
#sb-search{width:100%;padding:7px 10px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#f1f5f9;font-size:13px;outline:none;}
#sb-search::placeholder{color:#475569;}
#sb-search:focus{border-color:var(--accent);}
#sb-mode{display:flex;gap:1px;margin-top:8px;}
.mode-btn{flex:1;padding:5px 0;background:#1e293b;border:none;border-radius:0;color:#64748b;font-size:11px;cursor:pointer;transition:all .1s;}
.mode-btn:first-child{border-radius:4px 0 0 4px;}
.mode-btn:last-child{border-radius:0 4px 4px 0;}
.mode-btn.active{background:var(--accent);color:#fff;font-weight:600;}
#nav{flex:1;overflow-y:auto;padding:6px 0 16px;}
.nav-group-label{font-size:10px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.08em;padding:12px 14px 3px;}
.nav-item{display:block;padding:7px 14px;color:var(--sfg);font-size:13px;cursor:pointer;border-left:3px solid transparent;transition:all .1s;line-height:1.3;}
.nav-item:hover{background:var(--shover);color:#e2e8f0;}
.nav-item.active{background:#1e293b;color:#f1f5f9;border-left-color:var(--accent);font-weight:600;}
.nav-item.hidden{display:none;}
.nav-group-label.hidden{display:none;}
#nav::-webkit-scrollbar{width:3px;}
#nav::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}
#sb-footer{padding:10px 14px;border-top:1px solid #1e293b;}
#sb-footer p{font-size:10px;color:#334155;line-height:1.5;}

/* ── Main ── */
#main{flex:1;overflow-y:auto;padding:36px 44px 60px;}
#main::-webkit-scrollbar{width:5px;}
#main::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}

/* Welcome */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;text-align:center;}
#welcome h2{font-size:24px;font-weight:700;margin-bottom:8px;}
#welcome p{font-size:15px;color:var(--muted);max-width:420px;line-height:1.6;}
.wgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:28px;max-width:560px;width:100%;}
.wcard{padding:14px;background:var(--surf);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .1s,box-shadow .1s;text-align:left;}
.wcard:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(59,130,246,.12);}
.wcard-title{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;}
.wcard-sub{font-size:10px;color:var(--muted);margin-top:3px;}

/* Object detail */
#detail{display:none;}
.obj-title{font-size:24px;font-weight:800;color:var(--text);margin-bottom:6px;}
.obj-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.02em;}
.badge-blue{background:#dbeafe;color:#1d4ed8;}
.badge-red{background:#fee2e2;color:#b91c1c;}
.badge-yellow{background:#fef9c3;color:#854d0e;}
.badge-green{background:#dcfce7;color:#15803d;}
.badge-gray{background:#f1f5f9;color:#475569;}
.obj-desc{font-size:14px;color:var(--muted);line-height:1.65;max-width:680px;margin-bottom:28px;}

/* Section */
.sec{margin-bottom:30px;}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* Tables */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surf);}
th{background:#f8fafc;padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.4;}
tr:last-child td{border-bottom:none;}
tr.dep-row{opacity:.45;}
tr.dep-row td:first-child{text-decoration:line-through;}

/* Field cells */
.fn{font-weight:600;font-size:13px;}
.fh{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#1d4ed8;background:#eff6ff;padding:1px 5px;border-radius:3px;display:inline-block;}
.fh-alt{font-family:'SF Mono',Consolas,monospace;font-size:10px;color:#6b7280;display:block;margin-top:3px;}
.fh-auto{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#64748b;font-style:italic;}
.dep-tag{font-size:10px;background:#fee2e2;color:#b91c1c;padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:600;}
.req-icon{display:inline-block;width:8px;height:8px;border-radius:50%;}
.req-y{background:var(--danger);}
.req-n{background:#d1d5db;}
.vals{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#7c3aed;background:#f5f3ff;padding:2px 6px;border-radius:3px;display:inline-block;line-height:1.5;}

/* Filter bar */
.fbar{display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap;}
.fbar-label{font-size:11px;color:var(--muted);}
.fbtn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surf);font-size:11px;cursor:pointer;color:var(--muted);transition:all .1s;}
.fbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
.field-search-wrap{margin-left:auto;}
#field-search{padding:5px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;width:180px;}
#field-search:focus{border-color:var(--accent);}

/* Sample */
.sample-box{background:#0f172a;border-radius:8px;padding:16px 16px 14px;position:relative;}
.s-line{font-family:'SF Mono',Consolas,monospace;font-size:12px;line-height:1.9;white-space:pre-wrap;word-break:break-all;}
.s-head{color:#7dd3fc;}
.s-data{color:#86efac;}
.copy-btn{position:absolute;top:12px;right:12px;padding:4px 11px;background:#1e293b;border:1px solid #334155;border-radius:5px;color:#94a3b8;font-size:11px;cursor:pointer;transition:all .1s;}
.copy-btn:hover{background:#334155;color:#f1f5f9;}
.copy-btn.ok{color:#86efac;border-color:#4ade80;}

/* Notes */
.notes-list{list-style:none;display:flex;flex-direction:column;gap:7px;}
.notes-list li{padding:9px 13px;background:#fefce8;border-left:3px solid #fbbf24;border-radius:0 6px 6px 0;font-size:13px;line-height:1.5;color:#78350f;}

/* Endpoint path */
.epath{font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#059669;background:#ecfdf5;padding:1px 6px;border-radius:3px;}

/* Field search / cross-spec */
#xsearch-view{display:none;}
.xs-header{font-size:22px;font-weight:700;margin-bottom:20px;}
.xs-empty{color:var(--muted);font-size:14px;margin-top:40px;text-align:center;}
.xs-result{padding:13px 16px;background:var(--surf);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:border-color .1s;}
.xs-result:hover{border-color:var(--accent);}
.xs-obj{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px;}
.xs-fn{font-size:14px;font-weight:700;}
.xs-fh{font-family:monospace;font-size:12px;color:#1d4ed8;margin-top:3px;}
.xs-cm{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}
mark{background:#fef08a;padding:0 1px;border-radius:2px;}

/* Value tables */
.vtbl-wrap{margin-top:12px;}
.vtbl-caption{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px;}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sb-head">
    <h1>Snapshot Flat File<br>Field Reference</h1>
    <input id="sb-search" type="text" placeholder="Search objects or fields…" autocomplete="off">
    <div id="sb-mode">
      <button class="mode-btn active" id="mode-browse" onclick="setMode('browse')">Browse</button>
      <button class="mode-btn" id="mode-xsearch" onclick="setMode('xsearch')">Field Search</button>
    </div>
  </div>
  <div id="nav"></div>
  <div id="sb-footer"><p>17 object types · Blackboard Learn<br>Snapshot Flat File integration</p></div>
</div>

<div id="main">
  <div id="welcome">
    <h2>Snapshot Flat File Reference</h2>
    <p>Select an object from the sidebar to view its field specifications, endpoints, and sample feed.</p>
    <div class="wgrid" id="wgrid"></div>
  </div>
  <div id="detail"></div>
  <div id="xsearch-view">
    <div class="xs-header">Field Search</div>
    <div style="margin-bottom:20px;">
      <input id="xs-input" type="text" placeholder="Search by field name, header, or comment…"
        style="width:100%;max-width:500px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;"
        oninput="runXSearch(this.value)">
    </div>
    <div id="xs-results"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const SPECS = [
{
  id:'snapshot-flatfile-user',title:'User',sis_object:'Person',
  endpoint_slug:'person',insert_update:'Smart Insert or Update',delete_behavior:'Disable',

    {name:'Country',header:'country',required:false,unique:false,format:'Max 50',multibyte:true},
    {name:'Department',header:'department',required:false,unique:false,format:'Max 100',multibyte:true},
    {name:'Domain Name',header:'domain_name',required:false,unique:false,format:'Max 255',comment:'Must match a configured hostname. Set at insert only — updates silently ignored.'},

    {name:'Website',header:'webpage',required:false,unique:false,format:'Max 100'},
    {name:'Work Phone',header:'b_phone_1',required:false,unique:false,format:'Max 50',multibyte:true},
    {name:'Work Phone (Secondary)',header:'b_phone_2',required:false,unique:false,format:'Max 50',multibyte:true},

    {id:'system_role_values',caption:'System Role Values',columns:['Role','Accepted Values'],rows:[

  notes:['external_person_key must never change. The database cannot merge data between distinct accounts.',

{
  id:'snapshot-flatfile-course',title:'Course / Organization',sis_object:'Course or Organization',
  endpoint_slug:'course',insert_update:'Smart Insert or Update',delete_behavior:'Disable',

{
  id:'snapshot-flatfile-terms',title:'Terms',sis_object:'Term',

  description:'The Term object creates and manages academic terms in Blackboard Learn. Terms control course availability windows and can be associated with courses via external_term_key.',

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let currentSpec = null;
let fieldFilter = 'all'; // all | required | optional | deprecated
let mode = 'browse'; // browse | xsearch

const GROUP_ORDER = ['Core','Hierarchy','Curriculum','Associations'];

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
function init() {
  buildNav();
  buildWelcomeGrid();
  document.getElementById('sb-search').addEventListener('input', e => onSearch(e.target.value));
  document.getElementById('field-search') && document.getElementById('field-search').addEventListener('input', e => filterFields(e.target.value));
}

function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  GROUP_ORDER.forEach(group => {
    const specs = SPECS.filter(s => s.group === group);
    const groupEl = document.createElement('div');
    groupEl.className = 'nav-group-label';
    groupEl.dataset.group = group;
    groupEl.textContent = group;
    nav.appendChild(groupEl);
    specs.forEach(spec => {
      const item = document.createElement('div');
      item.className = 'nav-item';
      item.dataset.id = spec.id;
      item.textContent = spec.title;
      item.onclick = () => showSpec(spec.id);
      nav.appendChild(item);
    });
  });
}

function buildWelcomeGrid() {
  const grid = document.getElementById('wgrid');
  const groups = {};
  SPECS.forEach(s => { if(!groups[s.group]) groups[s.group]=[]; groups[s.group].push(s); });
  GROUP_ORDER.forEach(g => {
    if(!groups[g]) return;
    const card = document.createElement('div');
    card.className = 'wcard';
    card.innerHTML = `<div class="wcard-title">${g}</div><div class="wcard-sub">${groups[g].length} object${groups[g].length>1?'s':''}</div>`;
    card.onclick = () => { showSpec(groups[g][0].id); };
    grid.appendChild(card);
  });
}

// ─────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────
function showSpec(id) {
  const spec = SPECS.find(s => s.id === id);
  if(!spec) return;
  currentSpec = spec;
  fieldFilter = 'all';

  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('xsearch-view').style.display = 'none';
  document.getElementById('detail').style.display = 'block';

  renderDetail(spec);
}

// ─────────────────────────────────────────────
//  RENDER DETAIL
// ─────────────────────────────────────────────
function renderDetail(spec) {
  const el = document.getElementById('detail');
  const deleteBadge = spec.delete_behavior === 'Purge'
    ? '<span class="badge badge-red">⚠ Delete: Purge</span>'
    : '<span class="badge badge-yellow">Delete: Disable</span>';

  const reqCount = spec.fields.filter(f=>f.required).length;
  const depCount = spec.fields.filter(f=>f.deprecated).length;

  el.innerHTML = `
    <div class="obj-title">${spec.title}</div>
    <div class="obj-meta">
      <span class="badge badge-gray">${spec.sis_object}</span>
      <span class="badge badge-blue">${spec.insert_update}</span>
      ${deleteBadge}
      <span class="badge badge-gray">/${spec.endpoint_slug}/</span>
    </div>
    <div class="obj-desc">${spec.description}</div>

    <div class="sec">
      <div class="sec-title">Endpoints</div>
      <div class="tbl-wrap">${renderEndpoints(spec)}</div>
    </div>

    <div class="sec">
      <div class="sec-title">Fields
        <span style="font-size:10px;font-weight:400;color:var(--muted);margin-left:8px;">${spec.fields.length} total · ${reqCount} required${depCount?` · ${depCount} deprecated`:''}</span>
      </div>
      <div class="fbar">
        <span class="fbar-label">Show:</span>
        <button class="fbtn on" onclick="setFilter('all',this)">All</button>
        <button class="fbtn" onclick="setFilter('required',this)">Required only</button>
        <button class="fbtn" onclick="setFilter('optional',this)">Optional only</button>
        ${depCount?'<button class="fbtn" onclick="setFilter(\'deprecated\',this)">Deprecated</button>':''}
        <div class="field-search-wrap"><input id="field-search" type="text" placeholder="Filter fields…" oninput="filterFields(this.value)"></div>
      </div>
      <div class="tbl-wrap" id="fields-table-wrap">${renderFieldsTable(spec)}</div>
    </div>

    ${spec.value_tables && spec.value_tables.length ? `
    <div class="sec">
      <div class="sec-title">Value Tables</div>
      ${spec.value_tables.map(vt => renderValueTable(vt)).join('')}
    </div>` : ''}

    <div class="sec">
      <div class="sec-title">Sample Feed</div>
      ${renderSample(spec)}
    </div>

    ${spec.notes && spec.notes.length ? `
    <div class="sec">
      <div class="sec-title">Notes</div>
      <ul class="notes-list">${spec.notes.map(n=>`<li>${n}</li>`).join('')}</ul>
    </div>` : ''}
  `;
}

function renderEndpoints(spec) {
  const hasVariant = spec.endpoints.some(e=>e.variant);
  return `<table>
    <thead><tr>
      <th>Operation</th>
      ${hasVariant?'<th>Variant</th>':''}
      <th>Path</th>
    </tr></thead>
    <tbody>
    ${spec.endpoints.map(e=>`<tr class="endpoint-row">
      <td>${e.op}</td>
      ${hasVariant?`<td>${e.variant||''}</td>`:''}
      <td><span class="epath">${e.path}</span></td>
    </tr>`).join('')}
    </tbody>
  </table>`;
}

function renderFieldsTable(spec) {
  return `<table id="fields-table">
    <thead><tr>
      <th>Field Name</th>
      <th>Feed Header</th>
      <th style="text-align:center">Req</th>
      <th style="text-align:center">Unique</th>
      <th>Format</th>
      <th>Values</th>
      <th>Notes</th>
    </tr></thead>
    <tbody>
    ${spec.fields.map((f,i) => {
      const dep = f.deprecated ? 'dep-row' : '';
      const isAuto = f.header === '(auto-populated)';
      const headerHtml = isAuto
        ? `<span class="fh-auto">(auto-populated)</span>`
        : `<span class="fh">${f.header}</span>${f.org_variant ? `<span class="fh-alt">org: ${f.org_variant}</span>` : ''}`;
      return `<tr class="field-row ${dep}" data-name="${f.name.toLowerCase()}" data-header="${(f.header||'').toLowerCase()}" data-req="${f.required}" data-dep="${!!f.deprecated}">
        <td class="fn">${f.name}${f.deprecated?'<span class="dep-tag">deprecated</span>':''}</td>
        <td>${headerHtml}</td>
        <td style="text-align:center"><span class="req-icon ${f.required?'req-y':'req-n'}" title="${f.required?'Required':'Optional'}"></span></td>
        <td style="text-align:center"><span class="req-icon ${f.unique?'req-y':'req-n'}" title="${f.unique?'Unique':'Not unique'}"></span></td>
        <td style="color:var(--muted);font-size:12px;">${f.format||''}</td>
        <td>${f.values?`<span class="vals">${f.values}</span>`:''}</td>
        <td style="font-size:12px;color:var(--muted);max-width:280px;">${f.comment||''}</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
}

function renderValueTable(vt) {
  return `<div class="vtbl-wrap">
    <div class="vtbl-caption">${vt.caption}</div>
    <div class="tbl-wrap" style="margin-bottom:12px;">
      <table>
        <thead><tr>${vt.columns.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${vt.rows.map(r=>`<tr>${r.map(c=>`<td style="font-family:monospace;font-size:12px;">${c}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
  </div>`;
}

function renderSample(spec) {
  const headerLine = spec.sample.headers.join('|');
  const dataLines = spec.sample.rows.map(r => r.join('|')).join('\n');
  const full = headerLine + '\n' + dataLines;
  return `<div class="sample-box">
    <button class="copy-btn" onclick="copySample('${btoa(unescape(encodeURIComponent(full)))}',this)">Copy</button>
    <div class="s-line s-head">${escHtml(headerLine)}</div>
    ${spec.sample.rows.map(r=>`<div class="s-line s-data">${escHtml(r.join('|'))}</div>`).join('')}
    ${spec.sample.note?`<div style="margin-top:8px;font-size:11px;color:#64748b;">${escHtml(spec.sample.note)}</div>`:''}
  </div>`;
}

// ─────────────────────────────────────────────
//  FILTERS
// ─────────────────────────────────────────────
function setFilter(filter, btn) {
  fieldFilter = filter;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  applyFieldVisibility();
}

function filterFields(term) {
  applyFieldVisibility(term.toLowerCase());
}

function applyFieldVisibility(term='') {
  const rows = document.querySelectorAll('.field-row');
  rows.forEach(row => {
    const dep = row.dataset.dep === 'true';
    const req = row.dataset.req === 'true';
    const name = row.dataset.name || '';
    const header = row.dataset.header || '';
    const text = row.textContent.toLowerCase();

    let show = true;
    if(fieldFilter === 'required' && !req) show = false;
    if(fieldFilter === 'optional' && req) show = false;
    if(fieldFilter === 'deprecated' && !dep) show = false;
    if(term && !name.includes(term) && !header.includes(term) && !text.includes(term)) show = false;
    row.classList.toggle('hidden', !show);
  });
}

// ─────────────────────────────────────────────
//  MODE & SEARCH
// ─────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('mode-browse').classList.toggle('active', m==='browse');
  document.getElementById('mode-xsearch').classList.toggle('active', m==='xsearch');
  if(m === 'xsearch') {
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('detail').style.display = 'none';
    document.getElementById('xsearch-view').style.display = 'block';
    setTimeout(()=>document.getElementById('xs-input').focus(), 50);
  } else {
    document.getElementById('xsearch-view').style.display = 'none';
    if(currentSpec) { document.getElementById('detail').style.display='block'; }
    else { document.getElementById('welcome').style.display='flex'; }
  }
}

function onSearch(val) {
  const q = val.toLowerCase().trim();
  let anyVisible = false;
  let lastGroup = null;
  const groupEls = {};

  document.querySelectorAll('.nav-group-label').forEach(el => { groupEls[el.dataset.group] = el; });

  document.querySelectorAll('.nav-item').forEach(item => {
    const title = item.textContent.toLowerCase();
    const spec = SPECS.find(s=>s.id===item.dataset.id);
    const match = !q || title.includes(q) || (spec && spec.sis_object.toLowerCase().includes(q));
    item.classList.toggle('hidden', !match);
    if(match) anyVisible = true;
  });

  GROUP_ORDER.forEach(g => {
    if(!groupEls[g]) return;
    const hasVisible = [...document.querySelectorAll(`.nav-item`)].some(el=>{
      const s = SPECS.find(sp=>sp.id===el.dataset.id);
      return s && s.group===g && !el.classList.contains('hidden');
    });
    groupEls[g].classList.toggle('hidden', !hasVisible);
  });
}

function runXSearch(q) {
  const container = document.getElementById('xs-results');
  if(!q || q.length < 2) { container.innerHTML = '<div class="xs-empty">Type at least 2 characters to search all fields.</div>'; return; }
  const lq = q.toLowerCase();
  const results = [];
  SPECS.forEach(spec => {
    spec.fields.forEach(f => {
      const match = f.name.toLowerCase().includes(lq)
        || (f.header||'').toLowerCase().includes(lq)
        || (f.org_variant||'').toLowerCase().includes(lq)
        || (f.comment||'').toLowerCase().includes(lq);
      if(match) results.push({spec, field:f});
    });
  });
  if(!results.length) { container.innerHTML = '<div class="xs-empty">No fields match that search.</div>'; return; }

  container.innerHTML = results.slice(0,80).map(r => {
    const hl = s => s ? s.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`) : '';
    return `<div class="xs-result" onclick="setMode('browse');showSpec('${r.spec.id}')">
      <div class="xs-obj">${r.spec.title}</div>
      <div class="xs-fn">${hl(r.field.name)}${r.field.deprecated?'<span class="dep-tag" style="margin-left:6px;">deprecated</span>':''}</div>
      <div class="xs-fh">${r.field.header === '(auto-populated)' ? '<em style="color:#94a3b8">(auto-populated)</em>' : hl(r.field.header)}${r.field.org_variant?` <span style="color:#94a3b8">/ ${hl(r.field.org_variant)}</span>`:''}</div>
      ${r.field.comment?`<div class="xs-cm">${hl(r.field.comment)}</div>`:''}
    </div>`;
  }).join('');
  if(results.length > 80) container.innerHTML += `<div style="font-size:12px;color:var(--muted);margin-top:8px;">Showing 80 of ${results.length} results. Refine your search.</div>`;
}

// ─────────────────────────────────────────────
//  UTILITIES
// ─────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copySample(b64, btn) {
  const text = decodeURIComponent(escape(atob(b64)));
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('ok'); }, 2000);
  });
}

init();
</script>
