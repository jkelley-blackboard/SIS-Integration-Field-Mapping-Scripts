id: snapshot-flatfile-hierarchy-node
title: "Snapshot Flat File — Hierarchy Node"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Hierarchy Node
endpoint_slug: node
insert_update: Smart Insert or Update
delete_behavior: Purge
description: >
  The Hierarchy Node object creates and manages nodes in the Institutional
  Hierarchy. Nodes are organized into a tree structure with a required
  parent reference.

endpoints:
  - operation: Store
    path: node/store
  - operation: Complete Refresh
    path: node/refresh
  - operation: Complete Refresh by Data Source
    path: node/refreshlegacy
  - operation: Delete
    path: node/delete

fields:
  - name: Batch Uid
    header: external_node_key
    required: true
    unique: true
    format: Max 255
    multibyte: true
    comment: Letters, digits, dashes, and periods only — no spaces.

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Parent Batch Uid
    header: parent_node_key
    required: true
    unique: false
    format: Max 64
    comment: The external_node_key of the parent node. Submit parent nodes before child nodes.

  - name: Name
    header: name
    required: true
    unique: false
    format: Max 255
    comment: Node name as displayed in the UI.

  - name: Description
    header: description
    required: false
    unique: false
    format: Max 1000
    comment: Description of the node.

  - name: Replacement Batch Uid
    header: new_external_node_key
    required: false
    unique: true
    format: Max 255
    multibyte: true
    comment: Use only when a Node's EXTERNAL KEY must change.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.NodeReplacementDataSourceBatchUid"

sample:
  headers:
    - external_node_key
    - data_source_key
    - parent_node_key
    - name
  rows:
    - ["NODE.ENGR.DEPT", "SIS-IMPORT-2025", "NODE.ENGR", "Department of Engineering"]

notes:
  - "Delete behavior is Purge. Deleted nodes are permanently removed."
  - "Minimum required headers: external_node_key, data_source_key, parent_node_key, name."
  - Submit parent nodes before child nodes to ensure the hierarchy can be resolved.
  - external_node_key may contain only letters, digits, dashes, and periods — no spaces.
