id: snapshot-flatfile-category
title: "Snapshot Flat File — Category"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Course / Organization Category
endpoint_slug: coursecategory
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Category object creates and manages catalog categories for Courses and
  Organizations. Categories may be hierarchical — a category can be the parent
  of other categories.

endpoints:
  - operation: Store
    path: coursecategory/store
    variant: Course Category
  - operation: Complete Refresh
    path: coursecategory/refresh
    variant: Course Category
  - operation: Complete Refresh by Data Source
    path: coursecategory/refreshlegacy
    variant: Course Category
  - operation: Delete
    path: coursecategory/delete
    variant: Course Category
  - operation: Store
    path: organizationcategory/store
    variant: Organization Category
  - operation: Complete Refresh
    path: organizationcategory/refresh
    variant: Organization Category
  - operation: Complete Refresh by Data Source
    path: organizationcategory/refreshlegacy
    variant: Organization Category
  - operation: Delete
    path: organizationcategory/delete
    variant: Organization Category

fields:
  - name: Batch Uid
    header: external_category_key
    required: true
    unique: true
    format: Max 64
    multibyte: true
    comment: Must be unique. Corresponds to the Category Mnemonic field in the UI.

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Title
    header: title
    required: true
    unique: false
    format: Max 255
    multibyte: true
    comment: The name of the category as displayed to users in the UI.

  - name: Available
    header: available_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Establishes availability within Blackboard Learn.

  - name: Description
    header: description
    required: false
    unique: false
    comment: Category description.

  - name: Front Page
    header: frontpage_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Determines whether the category is displayed on the front page of the catalog.

  - name: Is Restricted
    header: restrict_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Restricts the Course or Organization to members only.

  - name: Parent Batch Uid
    header: parent_category_key
    required: false
    unique: false
    format: Max 64
    comment: >
      The external_category_key of the parent category. Makes this category
      a child of the specified parent.

  - name: Replacement Batch Uid
    header: new_external_category_key
    required: false
    unique: true
    format: Max 64
    multibyte: true
    comment: Use only when the category's EXTERNAL KEY must change.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.CourseCatReplacementDataSourceBatchUid"

  - name: Row Status
    header: row_status
    required: false
    unique: false
    values: "'enabled' | 'disabled' | 'deleted'"
    comment: >
      enabled: normal access. disabled: visible but not editable.
      deleted: scheduled for removal.

sample:
  headers:
    - external_category_key
    - data_source_key
    - title
    - available_ind
    - frontpage_ind
    - row_status
  rows:
    - ["CAT-STEM", "SIS-IMPORT-2025", "STEM Courses", "Y", "Y", "enabled"]

notes:
  - >
    Course and Organization categories use the same fields but are submitted
    to separate endpoints (/coursecategory/ or /organizationcategory/).
  - >
    parent_category_key must reference an existing category. Submit parent
    categories before child categories.
