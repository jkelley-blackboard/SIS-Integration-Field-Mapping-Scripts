id: snapshot-flatfile-secondary-institution-role
title: "Snapshot Flat File — Secondary Institution Role"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: User Secondary Institution Role
endpoint_slug: secondaryinstrole
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Secondary Institution Role object assigns additional institution roles
  to users. A user may hold multiple institution roles; this object manages
  the secondary assignments.

endpoints:
  - operation: Store
    path: secondaryinstrole/store
  - operation: Complete Refresh
    path: secondaryinstrole/refresh
  - operation: Complete Refresh by Data Source
    path: secondaryinstrole/refreshlegacy
  - operation: Delete
    path: secondaryinstrole/delete

fields:
  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Secondary Institution Role ID
    header: role_id
    required: true
    unique: false
    comment: >
      The identifier for the secondary institution role. Must match a valid
      Institution Role ID configured on the system. See Administrator Panel >
      Institution Roles.

  - name: User Batch Uid
    header: external_person_key
    required: true
    unique: false
    format: Max 64
    comment: The external_person_key (batch_uid) of the user.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.SecondaryInstRoleReplacementDataSourceBatchUid"

  - name: Row Status
    header: row_status
    required: false
    unique: false
    values: "'enabled' | 'disabled' | 'deleted'"
    comment: >
      enabled: normal access. disabled: visible but not editable.
      deleted: records set to deleted must be manually removed by an administrator.

sample:
  headers:
    - data_source_key
    - external_person_key
    - role_id
    - row_status
  rows:
    - ["SIS-IMPORT-2025", "STU-100042", "ONLINE-STUDENT", "enabled"]

notes:
  - >
    Deleted rows are not automatically removed. Records set to deleted must be
    manually removed by an administrator.
  - >
    role_id must match a valid Institution Role ID configured on your system.
    See Administrator Panel > Institution Roles.
