id: snapshot-flatfile-hierarchy-user-association
title: "Snapshot Flat File — Hierarchy User Association"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: User Association
endpoint_slug: userassociation
insert_update: Smart Insert or Update
delete_behavior: Purge
description: >
  The Hierarchy User Association object associates users with nodes in the
  Institutional Hierarchy.

endpoints:
  - operation: Store
    path: userassociation/store
  - operation: Complete Refresh
    path: userassociation/refresh
  - operation: Complete Refresh by Data Source
    path: userassociation/refreshlegacy
  - operation: Delete
    path: userassociation/delete

fields:
  - name: Batch Uid
    header: external_association_key
    required: true
    unique: true
    format: Max 64
    comment: >
      Unique identifier for this user-to-node association. Recommended convention:
      concatenate the User and Node batch UIDs (e.g. STU-100042_NODE.ENGR.DEPT).

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Node Batch Uid
    header: external_node_key
    required: true
    unique: false
    format: Max 64
    comment: >
      The external_node_key of the target node. Also the Node Identifier
      found in Edit Node in the UI.

  - name: User Batch Uid
    header: external_user_key
    required: true
    unique: false
    format: Max 64
    comment: The external_person_key of the user to be associated with this node.

  - name: Replacement Batch Uid
    header: new_external_association_key
    required: false
    unique: true
    format: Max 64
    multibyte: true
    comment: Use only when an association's EXTERNAL KEY must change.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.UserAssociationReplacementDataSourceBatchUid"

sample:
  headers:
    - external_association_key
    - data_source_key
    - external_node_key
    - external_user_key
  rows:
    - ["STU-100042_NODE.ENGR.DEPT", "SIS-IMPORT-2025", "NODE.ENGR.DEPT", "STU-100042"]

notes:
  - "Delete behavior is Purge. Deleted associations are permanently removed."
  - >
    Minimum required headers: external_association_key, data_source_key,
    external_node_key, external_user_key.
  - >
    external_association_key must be unique. The recommended convention is to
    concatenate the User Batch Uid and Node Batch Uid separated by an underscore.
