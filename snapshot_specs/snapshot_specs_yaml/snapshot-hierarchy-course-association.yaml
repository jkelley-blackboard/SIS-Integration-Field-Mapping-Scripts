id: snapshot-flatfile-hierarchy-course-association
title: "Snapshot Flat File — Hierarchy Course Association"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Course / Organization Association
endpoint_slug: courseassociation
insert_update: Smart Insert or Update
delete_behavior: Purge
description: >
  The Hierarchy Course Association object associates Courses and Organizations
  with nodes in the Institutional Hierarchy.

endpoints:
  - operation: Store
    path: courseassociation/courseassociation/store
    variant: Course
  - operation: Complete Refresh
    path: courseassociation/courseassociation/refresh
    variant: Course
  - operation: Complete Refresh by Data Source
    path: courseassociation/courseassociation/refreshlegacy
    variant: Course
  - operation: Delete
    path: courseassociation/courseassociation/delete
    variant: Course
  - operation: Store
    path: courseassociation/organizationassociation/store
    variant: Organization
  - operation: Complete Refresh
    path: courseassociation/organizationassociation/refresh
    variant: Organization
  - operation: Complete Refresh by Data Source
    path: courseassociation/organizationassociation/refreshlegacy
    variant: Organization
  - operation: Delete
    path: courseassociation/organizationassociation/delete
    variant: Organization

fields:
  - name: Batch Uid
    header: external_association_key
    required: true
    unique: true
    format: Max 64
    comment: >
      Unique identifier for this course-to-node association. Recommended convention:
      concatenate the Course and Node batch UIDs (e.g. MATH101-F25_NODE.ENGR.DEPT).

  - name: Course / Org Batch Uid
    header: external_course_key
    org_variant: external_organization_key
    required: true
    unique: false
    format: Max 64
    comment: The external_course_key of the course to be associated.

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Node Batch Uid
    header: external_node_key
    required: true
    unique: false
    format: Max 64
    multibyte: true
    comment: The external_node_key of the target node.

  - name: Primary Association Indicator
    header: is_primary_association
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: >
      Designates this as the primary association when a course is associated
      with multiple nodes.

  - name: Replacement Batch Uid
    header: new_external_association_key
    required: false
    unique: true
    format: Max 64
    multibyte: true
    comment: Use only when an association's EXTERNAL KEY must change.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.CourseAssociationReplacementDataSourceBatchUid"

sample:
  headers:
    - external_association_key
    - data_source_key
    - external_node_key
    - external_course_key
    - is_primary_association
  rows:
    - ["MATH101-F25_NODE.ENGR.DEPT", "SIS-IMPORT-2025", "NODE.ENGR.DEPT", "MATH101-F25", "Y"]

notes:
  - "Delete behavior is Purge. Deleted associations are permanently removed."
  - >
    Minimum required headers: external_association_key, data_source_key,
    external_node_key, external_course_key.
  - >
    Course and Organization associations use the same fields but are submitted
    to separate endpoints (/courseassociation/ or /organizationassociation/).
  - >
    external_association_key must be unique. The recommended convention is to
    concatenate the Course Batch Uid and Node Batch Uid.
