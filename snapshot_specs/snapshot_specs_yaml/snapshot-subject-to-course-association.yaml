id: snapshot-flatfile-subject-to-course-association
title: "Snapshot Flat File — Subject to Course Association"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Subject to Course Association
endpoint_slug: subjecttocourseassociation
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Subject to Course Association object links Courses to Subjects,
  classifying individual course offerings under their curricular subject area.

endpoints:
  - operation: Store
    path: subjecttocourseassociation/store
  - operation: Complete Refresh
    path: subjecttocourseassociation/refresh
  - operation: Complete Refresh by Data Source
    path: subjecttocourseassociation/refreshlegacy
  - operation: Delete
    path: subjecttocourseassociation/delete

fields:
  - name: Batch Uid
    header: external_association_key
    required: true
    unique: true
    format: Max 64
    comment: >
      Unique identifier for this Subject-to-Course association. Recommended
      convention: concatenate the Subject and Course batch UIDs
      (e.g. CHEM-SUBJ_MATH101-F25). Note: Subject batch UIDs may contain
      double underscores — use a different separator such as a dash or colon
      to avoid ambiguity.

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Course Batch Uid
    header: external_course_key
    required: true
    unique: false
    format: Max 64
    comment: The external_course_key of the Course being associated with the Subject.

  - name: Subject Batch Uid
    header: external_subject_key
    required: true
    unique: false
    format: Max 64
    comment: The external_subject_key of the Subject to which the Course is being associated.

sample:
  headers:
    - external_association_key
    - data_source_key
    - external_subject_key
    - external_course_key
  rows:
    - ["CHEM-SUBJ_MATH101-F25", "SIS-IMPORT-2025", "CHEM-SUBJ", "MATH101-F25"]

notes:
  - >
    Minimum required headers: external_association_key, data_source_key,
    external_course_key, external_subject_key.
  - >
    external_association_key must be unique. Because Subject IDs use double
    underscores, use a different separator (e.g. a dash) when building the
    association key to avoid ambiguity.
  - Both the Subject and Course must already exist before creating this association.
