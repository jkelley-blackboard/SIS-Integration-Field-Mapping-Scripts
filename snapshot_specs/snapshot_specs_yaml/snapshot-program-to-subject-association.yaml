id: snapshot-flatfile-program-to-subject-association
title: "Snapshot Flat File — Program to Subject Association"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Program to Subject Association
endpoint_slug: programtosubjectassociation
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Program to Subject Association object links Subjects to Programs,
  establishing the curricular relationship between a degree program and
  its constituent subject areas.

endpoints:
  - operation: Store
    path: programtosubjectassociation/store
  - operation: Complete Refresh
    path: programtosubjectassociation/refresh
  - operation: Complete Refresh by Data Source
    path: programtosubjectassociation/refreshlegacy
  - operation: Delete
    path: programtosubjectassociation/delete

fields:
  - name: Batch Uid
    header: external_association_key
    required: true
    unique: true
    format: Max 64
    comment: >
      Unique identifier for this Program-to-Subject association. Recommended
      convention: concatenate the Program and Subject batch UIDs
      (e.g. PROG-BSCS_CHEM-SUBJ). Use a natural unique key from your source
      system if one exists.

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Program Batch Uid
    header: external_program_key
    required: true
    unique: false
    format: Max 64
    comment: The external_program_key of the Program to which the Subject is being associated.

  - name: Subject Batch Uid
    header: external_subject_key
    required: true
    unique: false
    format: Max 64
    comment: The external_subject_key of the Subject being associated with the Program.

sample:
  headers:
    - external_association_key
    - data_source_key
    - external_program_key
    - external_subject_key
  rows:
    - ["PROG-BSCS_CHEM-SUBJ", "SIS-IMPORT-2025", "PROG-BSCS", "CHEM-SUBJ"]

notes:
  - >
    Minimum required headers: external_association_key, data_source_key,
    external_program_key, external_subject_key.
  - >
    external_association_key must be unique. The recommended convention is to
    concatenate the Program and Subject batch UIDs. If your source system has
    a natural unique key, that may be used instead.
  - Both the Program and Subject must already exist before creating this association.
