id: snapshot-flatfile-course
title: "Snapshot Flat File — Course / Organization"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Course or Organization
endpoint_slug: course
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Course object creates and updates Courses and Organizations in Blackboard
  Learn. Courses and Organizations use the same field structure but are submitted
  to separate endpoints and use different header names for key identifying fields.

endpoints:
  - operation: Store
    path: course/store
    variant: Course
  - operation: Complete Refresh
    path: course/refresh
    variant: Course
  - operation: Complete Refresh by Data Source
    path: course/refreshlegacy
    variant: Course
  - operation: Delete
    path: course/delete
    variant: Course
  - operation: Store
    path: organization/store
    variant: Organization
  - operation: Complete Refresh
    path: organization/refresh
    variant: Organization
  - operation: Complete Refresh by Data Source
    path: organization/refreshlegacy
    variant: Organization
  - operation: Delete
    path: organization/delete
    variant: Organization

fields:
  - name: Batch Uid
    header: external_course_key
    org_variant: external_organization_key
    required: true
    unique: true
    format: Max 64

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Course ID / Organization ID
    header: course_id
    org_variant: organization_id
    required: true
    unique: true
    format: Max 100
    comment: >
      Short name identifying the Course or Organization (e.g. MATH101_F25).
      Characters not allowed: space, &, /, ', +. Cannot be changed after creation.

  - name: Course Name / Organization Name
    header: course_name
    org_variant: organization_name
    required: true
    unique: false
    format: Max 255
    multibyte: true
    comment: Complete title used for display.

  - name: Available
    header: available_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Establishes availability within Blackboard Learn.

  - name: Allow Guests
    header: allow_guest_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Allows guest access.

  - name: Allow Observers
    header: allow_observer_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Allows observer access.

  - name: Show In Catalog
    header: catalog_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Establishes whether the Course or Organization appears in catalog.

  - name: Days of Use
    header: days_of_use
    required: false
    unique: false
    format: Numeric (e.g. 120)
    comment: >
      Number of days students may access after enrollment.
      Used when duration is set to D.

  - name: Description Page
    header: desc_page_ind
    required: false
    unique: false
    deprecated: true
    comment: Not currently supported. Do not use.

  - name: Duration
    header: duration
    required: false
    unique: false
    values: "See duration_values"
    comment: Schedules course availability window.

  - name: End Date
    header: end_date
    required: false
    unique: false
    format: yyyymmdd
    comment: Date the course stops being available.

  - name: Enrollment End Date
    header: enroll_end
    required: false
    unique: false
    format: yyyymmdd
    comment: Date that enrollment is no longer available.

  - name: Enrollment Start Date
    header: enroll_start
    required: false
    unique: false
    format: yyyymmdd
    comment: Date that enrollment may begin.

  - name: Enrollment Type
    header: enroll_option
    required: false
    unique: false
    values: "'instructor' | 'self' | 'email'"
    comment: Determines the enrollment method.

  - name: Fee
    header: fee
    required: false
    unique: false
    format: Numeric, 2 decimal places (e.g. 1500.00)
    comment: Fee associated with this Course or Organization.

  - name: Institution Name
    header: institution_name
    required: false
    unique: false
    format: Max 255
    multibyte: true
    comment: The name of the institution.

  - name: Language Pack
    header: locale
    required: false
    unique: false
    format: Max 20 (e.g. fr_FR)
    comment: Identifier for the preferred language pack.

  - name: Locked Out
    header: lockout_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: If Y, access is restricted based on end_date and start_date.

  - name: Maximum Disk Usage (soft limit)
    header: soft_limit
    required: false
    unique: false
    format: Numeric bytes (e.g. 10485760 for 10MB)
    comment: Triggers warning emails when course storage reaches this limit.

  - name: Primary Node Batch Uid
    header: primary_external_node_key
    required: false
    unique: false
    comment: External key of the primary institutional hierarchy node for this course.

  - name: Service Level Type
    header: service_level
    required: false
    unique: false
    values: "See service_level_values"
    comment: >
      Specifies the type of course. Not typically used in data feeds — set
      automatically by the endpoint.

  - name: Source Copy Key
    header: template_course_key
    org_variant: template_organization_key
    required: false
    unique: false
    format: Max 64
    multibyte: true
    comment: External key of the content source for copy operations.

  - name: Start Date
    header: start_date
    required: false
    unique: false
    format: yyyymmdd
    comment: Date the course begins to be available.

  - name: Term Key
    header: external_term_key
    required: false
    unique: false
    format: Max 256
    comment: External key of the term to which this course is associated.

  - name: Replacement Batch Uid
    header: new_external_course_key
    org_variant: new_external_organization_key
    required: false
    unique: true
    format: Max 64
    multibyte: true
    comment: Use only when the EXTERNAL KEY must change.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.CourseReplacementDataSourceBatchUid"

  - name: Row Status
    header: row_status
    required: false
    unique: false
    values: "'enabled' | 'disabled' | 'deleted'"
    comment: >
      enabled: normal access. disabled: visible but not editable.
      deleted: scheduled for removal.

value_tables:
  - id: duration_values
    caption: Duration Values
    columns: [Value, Description]
    rows:
      - ["C", "Continuous — always accessible"]
      - ["R", "Range — between start_date and end_date"]
      - ["D", "Fixed — N days from enrollment (see days_of_use)"]
      - ["T", "Term-dictated — controlled by the associated term"]

  - id: service_level_values
    caption: Service Level Values
    columns: [Value, Description]
    rows:
      - ["F", "Full — standard Course"]
      - ["C", "Community — Organization"]
      - ["S", "System — limited functions"]
      - ["R", "Not used"]
      - ["T", "Not used"]

sample:
  headers:
    - external_course_key
    - data_source_key
    - course_id
    - course_name
    - available_ind
    - duration
    - start_date
    - end_date
    - external_term_key
    - row_status
  rows:
    - ["MATH101-F25", "SIS-IMPORT-2025", "MATH101_F25",
       "Calculus I - Fall 2025", "Y", "R", "20250825", "20251215",
       "TERM-F25", "enabled"]

notes:
  - >
    Courses and Organizations share the same field structure but use different
    header names for key fields (course_id vs organization_id, etc.) and are
    submitted to separate endpoints.
  - course_id / organization_id cannot be changed after creation.
  - >
    service_level is set automatically by the endpoint. Do not supply this field
    in feeds — the /course/ endpoint sets F and /organization/ sets C.
  - >
    Data Source Key may be supplied by the integration configuration and does
    not need to appear in the file if so.
