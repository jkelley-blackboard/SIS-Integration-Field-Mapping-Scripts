id: snapshot-flatfile-terms
title: "Snapshot Flat File — Terms"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Term
endpoint_slug: term
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Term object creates and manages academic terms in Blackboard Learn.
  Terms control course availability windows and can be associated with
  courses via external_term_key.

endpoints:
  - operation: Store
    path: term/store
  - operation: Complete Refresh
    path: term/refresh
  - operation: Complete Refresh by Data Source
    path: term/refreshlegacy
  - operation: Delete
    path: term/delete

fields:
  - name: Batch Uid
    header: external_term_key
    required: true
    unique: true
    format: Max 256
    multibyte: true
    comment: >
      Short name used to uniquely identify the Term. Letters, digits, dashes,
      and periods only — no spaces.

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Name
    header: name
    required: true
    unique: false
    format: Max 333
    comment: Name of the term as displayed to users.

  - name: Available
    header: available_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Establishes availability within Blackboard Learn.

  - name: Days of Use
    header: days_of_use
    required: false
    unique: false
    format: Numeric
    comment: Number of days students may access courses after enrollment. Used when duration is Fixed.

  - name: Description
    header: description
    required: false
    unique: false
    format: No limit
    comment: Description of the Term.

  - name: Duration
    header: duration
    required: false
    unique: false
    values: "'Continuous' | 'Range' | 'Fixed'"
    comment: >
      Continuous: always accessible. Range: between start_date and end_date.
      Fixed: set number of days_of_use.

  - name: End Date
    header: end_date
    required: false
    unique: false
    format: yyyymmdd
    comment: The date the term stops being available.

  - name: Start Date
    header: start_date
    required: false
    unique: false
    format: yyyymmdd
    comment: The date the term begins to be available.

  - name: Replacement Batch Uid
    header: new_external_term_key
    required: false
    unique: true
    format: Max 256
    multibyte: true
    comment: Use only when a term's EXTERNAL KEY must change.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.TermReplacementDataSourceBatchUid"

  - name: Row Status
    header: row_status
    required: false
    unique: false
    values: "'enabled' | 'disabled' | 'deleted'"
    comment: >
      enabled: normal access. disabled: visible but not editable.
      deleted: scheduled for removal.

sample:
  headers:
    - external_term_key
    - data_source_key
    - name
    - available_ind
    - duration
    - start_date
    - end_date
    - row_status
  rows:
    - ["TERM-F25", "SIS-IMPORT-2025", "Fall 2025", "Y", "Range",
       "20250825", "20251215", "enabled"]

notes:
  - >
    external_term_key may contain only letters, digits, dashes, and periods.
    No spaces or other punctuation.
  - >
    Term availability controls associated course availability when the term's
    available_ind is set to N.
  - >
    UPCOMING (4000.15, production 7 May 2026) — Term Type: confirmed in release
    notes for flat file sync. Feed header and supported values not yet published;
    field exists in data model and is visible in field mapping UI on staging.
    Do not use in production feeds until header is confirmed.
  - >
    UPCOMING (SIS date unannounced) — Term Hierarchy: parent-child terms (Annual
    → Semester etc.) shipped as UI-only in 4000.8. No feed header or field
    mapping target exists on any confirmed system. Expected to follow standard
    UI → SIS → REST progression. Do not use in production feeds.
