id: snapshot-flatfile-course-standard-association
title: "Snapshot Flat File — Course Standard Association"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Goal / Standard Association
endpoint_slug: standardsassociation
insert_update: Smart Insert or Update
delete_behavior: Purge
description: >
  The Course Standard Association object links Goals and Standards to Courses
  in Blackboard Learn. This object is notably lean — it has only two fields,
  both required.

endpoints:
  - operation: Store
    path: standardsassociation/store
  - operation: Complete Refresh
    path: standardsassociation/refresh
  - operation: Complete Refresh by Data Source
    path: standardsassociation/refreshlegacy
  - operation: Delete
    path: standardsassociation/delete

fields:
  - name: Standard / Goal Key
    header: std_sub_doc_key
    required: true
    unique: false
    comment: >
      The unique identifier (batch_uid) of the Goal or Standard being associated.
      References a standard defined in the Goals / Standards catalog.

  - name: Course Key
    header: course_key
    required: true
    unique: false
    format: Max 64
    comment: The external_course_key of the Course to which the Goal or Standard will be associated.

sample:
  headers:
    - std_sub_doc_key
    - course_key
  rows:
    - ["GOAL-STEM-CRITICAL-THINKING", "MATH101-F25"]

notes:
  - "Delete behavior is Purge. Deleted associations are permanently removed."
  - "Minimum required headers: std_sub_doc_key, course_key."
  - The Goal or Standard must already exist in the Goals / Standards catalog before this association can be created.
  - No data_source_key or row_status — this object has a simpler structure than other association objects.
