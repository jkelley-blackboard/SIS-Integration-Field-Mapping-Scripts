id: snapshot-flatfile-user
title: "Snapshot Flat File — User"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Person
endpoint_slug: person
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The User object provisions and updates user accounts in Blackboard Learn.
  Each user is identified by a permanent external_person_key that must never
  change for the lifetime of the account. The database cannot merge data
  between distinct accounts.

endpoints:
  - operation: Store
    path: person/store
  - operation: Complete Refresh
    path: person/refresh
  - operation: Complete Refresh by Data Source
    path: person/refreshlegacy
  - operation: Delete
    path: person/delete

fields:
  - name: Batch Uid
    header: external_person_key
    required: true
    unique: true
    format: Max 64
    comment: >
      Permanent, non-changing identifier. The database cannot merge data
      between distinct accounts.

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: First Name
    header: firstname
    required: true
    unique: false
    format: Max 100
    multibyte: true

  - name: Last Name
    header: lastname
    required: true
    unique: false
    format: Max 100
    multibyte: true

  - name: Username
    header: user_id
    required: true
    unique: true
    format: Max 50
    multibyte: true
    comment: The username used to log into Blackboard. Must be globally unique.

  - name: Available
    header: available_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Establishes availability within Blackboard Learn.

  - name: Birthdate
    header: birthdate
    required: false
    unique: false
    format: yyyymmdd

  - name: City
    header: city
    required: false
    unique: false
    format: Max 50
    multibyte: true

  - name: Company
    header: company
    required: false
    unique: false
    format: Max 100
    multibyte: true

  - name: Country
    header: country
    required: false
    unique: false
    format: Max 50
    multibyte: true

  - name: Department
    header: department
    required: false
    unique: false
    format: Max 100
    multibyte: true

  - name: Domain Name
    header: domain_name
    required: false
    unique: false
    format: Max 255
    comment: >
      Must match a configured hostname. Invalid values silently ignored.
      Set at insert only — updates are ignored. e.g. blackboard.college.edu

  - name: Education Level
    header: educ_level
    required: false
    unique: false
    values: "See education_level_values"

  - name: Email
    header: email
    required: false
    unique: false
    format: Max 100
    comment: >
      Blackboard recommends this not be null — users without an email address
      cannot send email.

  - name: Gender
    header: gender
    required: false
    unique: false
    values: "'Not Disclosed' | 'Male' | 'Female'"

  - name: Home Phone
    header: h_phone_1
    required: false
    unique: false
    format: Max 50
    multibyte: true

  - name: Home Phone (Secondary)
    header: h_phone_2
    required: false
    unique: false
    format: Max 50
    multibyte: true

  - name: Institution Email
    header: inst_email
    required: false
    unique: true
    format: Max 254
    comment: >
      Can be set to null. No email communications are sent to this address.
      Used for third-party integrations only.

  - name: Job Title
    header: job_title
    required: false
    unique: false
    format: Max 100
    multibyte: true

  - name: Middle Name
    header: middlename
    required: false
    unique: false
    format: Max 100
    multibyte: true

  - name: Mobile Phone
    header: m_phone
    required: false
    unique: false
    format: Max 50
    multibyte: true

  - name: Name Pronunciation
    header: TBC
    required: false
    unique: false
    format: Max 1000
    multibyte: true
    comment: Phonetic spelling or pronunciation guide. Header value pending confirmation.

  - name: Other Name
    header: othername
    required: false
    unique: false
    format: Max 100
    comment: Alternate preferred name.

  - name: Password
    header: passwd
    required: false
    unique: false
    format: Max 32
    multibyte: true
    comment: If not provided, Learn auto-populates a SHA-512 hash.

  - name: Password Encryption Type
    header: pwencryptiontype
    required: false
    unique: false
    values: "'MD5' | 'SSHA'"

  - name: Primary Institution Role
    header: institution_role
    required: false
    unique: false
    comment: >
      Determines the user's view of Portal Modules. See Manage Institution
      Roles in System Admin for valid values on your system.

  - name: Pronouns
    header: pronouns
    required: false
    unique: false
    format: Max 1000
    comment: Multiple values accepted using comma as delimiter.

  - name: Replacement Batch Uid
    header: new_external_person_key
    required: false
    unique: true
    format: Max 64
    multibyte: true
    comment: Use only when a user's external_person_key must change.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.UserReplacementDataSourceBatchUid"

  - name: Row Status
    header: row_status
    required: false
    unique: false
    values: "'enabled' | 'disabled' | 'deleted'"
    comment: >
      enabled: normal access. disabled: visible but not editable.
      deleted: scheduled for removal.

  - name: State / Province
    header: state
    required: false
    unique: false
    format: Max 50
    multibyte: true

  - name: Street 1
    header: street_1
    required: false
    unique: false
    format: Max 100
    multibyte: true

  - name: Street 2
    header: street_2
    required: false
    unique: false
    format: Max 100
    multibyte: true

  - name: Student ID
    header: student_id
    required: false
    unique: false
    format: Max 100
    multibyte: true
    comment: Display only — not used for lookup or matching.

  - name: Suffix
    header: suffix
    required: false
    unique: false
    format: Max 100
    multibyte: true

  - name: System Role
    header: system_role
    required: false
    unique: false
    values: "See system_role_values"
    comment: Defaults to none if not provided.

  - name: Title
    header: title
    required: false
    unique: false
    format: Max 100
    multibyte: true

  - name: Website
    header: webpage
    required: false
    unique: false
    format: Max 100
    comment: URL of the user's personal web page.

  - name: Work Phone
    header: b_phone_1
    required: false
    unique: false
    format: Max 50
    multibyte: true

  - name: Work Phone (Secondary)
    header: b_phone_2
    required: false
    unique: false
    format: Max 50
    multibyte: true

  - name: Zip / Postal Code
    header: zip_code
    required: false
    unique: false
    format: Max 50
    multibyte: true

value_tables:
  - id: education_level_values
    caption: Education Level Values
    columns: [Value]
    rows:
      - ["K-8"]
      - ["high school"]
      - ["freshman"]
      - ["sophomore"]
      - ["junior"]
      - ["senior"]
      - ["graduate school"]
      - ["post-graduate school"]

  - id: system_role_values
    caption: System Role Values
    columns: [Role, Accepted Values]
    rows:
      - ["User Administrator", "account_admin, accountadmin, user_admin"]
      - ["System Support", "system_support, syssupport"]
      - ["Course Creator", "course_creator, creator"]
      - ["Support", "course_support, support"]
      - ["Guest", "guest"]
      - ["None", "none"]
      - ["Observer", "observer"]
      - ["Portal Administrator", "portal_admin, portal"]
      - ["System Administrator", "sys_admin, sysadmin, system_admin"]
      - ["eCommerce Administrator", "ecommerce_admin"]
      - ["Card Office Administrator", "card_office_admin"]
      - ["Store Administrator", "store_admin"]

sample:
  headers:
    - external_person_key
    - data_source_key
    - firstname
    - lastname
    - user_id
    - email
    - available_ind
    - institution_role
    - system_role
    - row_status
  rows:
    - ["STU-100042", "SIS-IMPORT-2025", "Maria", "Santos", "msantos",
       "msantos@university.edu", "Y", "Student", "none", "enabled"]

notes:
  - >
    external_person_key must never change. The database cannot merge data
    between distinct accounts. Use new_external_person_key only in the rare
    case a key genuinely must be replaced.
  - >
    Passwords: if passwd is not supplied, Blackboard auto-populates the field
    with a SHA-512 hash. Encourage users to set their own password on first login.
  - >
    Email: Blackboard strongly recommends email not be null. Users without an
    email address cannot send email from within Blackboard.
  - >
    inst_email is a unique identifier used for third-party integrations only.
    No Blackboard email communications are sent to this address.
  - >
    domain_name is set at insert only. Subsequent updates to this field are
    silently ignored.
  - >
    Data Source Key may be supplied by the integration configuration. If
    configured at the integration level it does not need to appear in the file.
