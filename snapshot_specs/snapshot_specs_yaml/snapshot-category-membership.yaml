id: snapshot-flatfile-category-membership
title: "Snapshot Flat File — Category Membership"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Course / Organization Category Membership
endpoint_slug: coursecategorymembership
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Category Membership object associates Courses and Organizations with
  catalog categories.

endpoints:
  - operation: Store
    path: coursecategorymembership/store
    variant: Course
  - operation: Complete Refresh
    path: coursecategorymembership/refresh
    variant: Course
  - operation: Complete Refresh by Data Source
    path: coursecategorymembership/refreshlegacy
    variant: Course
  - operation: Delete
    path: coursecategorymembership/delete
    variant: Course
  - operation: Store
    path: organizationcategorymembership/store
    variant: Organization
  - operation: Complete Refresh
    path: organizationcategorymembership/refresh
    variant: Organization
  - operation: Complete Refresh by Data Source
    path: organizationcategorymembership/refreshlegacy
    variant: Organization
  - operation: Delete
    path: organizationcategorymembership/delete
    variant: Organization

fields:
  - name: Batch Uid
    header: "(auto-populated)"
    required: true
    unique: true
    comment: Auto-populated by the system. Do not include in data feeds.

  - name: Category Batch Uid
    header: external_category_key
    required: true
    unique: false
    format: Max 64
    comment: The external_category_key of the category to add the course or organization to.

  - name: Course / Org Batch Uid
    header: external_course_key
    org_variant: external_organization_key
    required: true
    unique: false
    format: Max 64

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Available
    header: available_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Establishes availability within Blackboard Learn.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.CourseCatMemReplacementDataSourceBatchUid"

  - name: Row Status
    header: row_status
    required: false
    unique: false
    values: "'enabled' | 'disabled' | 'deleted'"
    comment: >
      enabled: normal access. disabled: visible but not editable.
      deleted: scheduled for removal.

sample:
  headers:
    - external_category_key
    - external_course_key
    - data_source_key
    - available_ind
    - row_status
  rows:
    - ["CAT-STEM", "MATH101-F25", "SIS-IMPORT-2025", "Y", "enabled"]

notes:
  - >
    Course and Organization category memberships use the same fields but are
    submitted to separate endpoints (/coursecategorymembership/ or
    /organizationcategorymembership/).
  - The Category and Course / Organization must already exist before creating a membership.
