id: snapshot-flatfile-subject-to-organization-association
title: "Snapshot Flat File — Subject to Organization Association"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Subject to Organization Association
endpoint_slug: subjecttoorgassociation
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Subject to Organization Association object links Organizations to Subjects,
  classifying organization offerings under their curricular subject area.

endpoints:
  - operation: Store
    path: subjecttoorgassociation/store
  - operation: Complete Refresh
    path: subjecttoorgassociation/refresh
  - operation: Complete Refresh by Data Source
    path: subjecttoorgassociation/refreshlegacy
  - operation: Delete
    path: subjecttoorgassociation/delete

fields:
  - name: Batch Uid
    header: external_association_key
    required: true
    unique: true
    format: Max 64
    comment: >
      Unique identifier for this Subject-to-Organization association. Recommended
      convention: concatenate the Subject and Organization batch UIDs
      (e.g. CHEM-SUBJ_ChemClub).

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Organization Batch Uid
    header: external_org_key
    required: true
    unique: false
    format: Max 64
    comment: The external_organization_key of the Organization being associated with the Subject.

  - name: Subject Batch Uid
    header: external_subject_key
    required: true
    unique: false
    format: Max 64
    comment: The external_subject_key of the Subject to which the Organization is being associated.

sample:
  headers:
    - external_association_key
    - data_source_key
    - external_subject_key
    - external_org_key
  rows:
    - ["CHEM-SUBJ_ChemClub", "SIS-IMPORT-2025", "CHEM-SUBJ", "ChemClub"]

notes:
  - >
    Minimum required headers: external_association_key, data_source_key,
    external_org_key, external_subject_key.
  - Both the Subject and Organization must already exist before creating this association.
