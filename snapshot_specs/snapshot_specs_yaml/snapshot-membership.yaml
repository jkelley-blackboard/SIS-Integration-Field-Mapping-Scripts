id: snapshot-flatfile-membership
title: "Snapshot Flat File — Course / Organization Membership"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Course or Organization Memberships (Enrollments and Staff Assignments)
endpoint_slug: membership
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Membership object creates and manages enrollments and staff assignments
  for Courses and Organizations. Courses and Organizations use the same fields
  but are submitted to separate endpoints.

endpoints:
  - operation: Store
    path: membership/store
    variant: Course
  - operation: Complete Refresh
    path: membership/refresh
    variant: Course
  - operation: Complete Refresh by Data Source
    path: membership/refreshlegacy
    variant: Course
  - operation: Delete
    path: membership/delete
    variant: Course
  - operation: Store
    path: organizationmembership/store
    variant: Organization
  - operation: Complete Refresh
    path: organizationmembership/refresh
    variant: Organization
  - operation: Complete Refresh by Data Source
    path: organizationmembership/refreshlegacy
    variant: Organization
  - operation: Delete
    path: organizationmembership/delete
    variant: Organization

fields:
  - name: Course / Org Batch Uid
    header: external_course_key
    org_variant: external_organization_key
    required: true
    unique: false
    format: Max 64
    multibyte: true

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: User Batch Uid
    header: external_person_key
    required: true
    unique: false
    format: Max 64
    multibyte: true
    comment: The external_person_key of the user being enrolled.

  - name: Available
    header: available_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Establishes availability within Blackboard Learn.

  - name: Cartridge Access
    header: hascartridgeaccess
    required: false
    unique: false
    deprecated: true
    comment: Not supported and targeted for removal. Do not use.

  - name: Image URL
    header: Image_URL
    required: false
    unique: false
    deprecated: true
    comment: Not supported and targeted for removal. Do not use.

  - name: Include In Roster
    header: roster_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Flag indicating whether the user is displayed in the course roster.

  - name: Introduction
    header: intro
    required: false
    unique: false
    format: Max 4000
    multibyte: true
    comment: Introduction information for the User Home Page within the Course.

  - name: Notes
    header: notes
    required: false
    unique: false
    format: No limit
    multibyte: true
    comment: Information pertinent to this user that may impact course participation.

  - name: Personal Information
    header: pinfo
    required: false
    unique: false
    format: No limit
    multibyte: true
    comment: Personal information for the User Home Page.

  - name: Primary Instructor
    header: primary_instructor
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: >
      Indicates primary instructor. Member must have a course role with the
      'treat as instructor' flag. A Y value on a non-instructor role is rejected.

  - name: Receive Email
    header: receive_email_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Flag whether email is enabled for this user in this course.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.MemberReplacementDataSourceBatchUid"

  - name: Role
    header: role
    required: false
    unique: false
    values: "'Instructor' | 'teaching_assistant' | 'course_builder' | 'Grader' | 'Student' | 'guest' | 'none'"
    comment: The user's role in the Course.

  - name: Row Status
    header: row_status
    required: false
    unique: false
    values: "'enabled' | 'disabled' | 'deleted'"
    comment: >
      enabled: normal access. disabled: visible but not editable.
      deleted: scheduled for removal.

  - name: Website 1 — Description
    header: link_description_1
    required: false
    unique: false
    format: Max 255

  - name: Website 1 — Name
    header: link_name_1
    required: false
    unique: false
    format: Max 100

  - name: Website 1 — URL
    header: link_url_1
    required: false
    unique: false
    format: Max 100

  - name: Website 2 — Description
    header: link_description_2
    required: false
    unique: false
    format: Max 255

  - name: Website 2 — Name
    header: link_name_2
    required: false
    unique: false
    format: Max 100

  - name: Website 2 — URL
    header: link_url_2
    required: false
    unique: false
    format: Max 100

  - name: Website 3 — Description
    header: link_description_3
    required: false
    unique: false
    format: Max 255

  - name: Website 3 — Name
    header: link_name_3
    required: false
    unique: false
    format: Max 100

  - name: Website 3 — URL
    header: link_url_3
    required: false
    unique: false
    format: Max 100

sample:
  headers:
    - external_course_key
    - data_source_key
    - external_person_key
    - role
    - available_ind
    - row_status
  rows:
    - ["MATH101-F25", "SIS-IMPORT-2025", "STU-100042", "Student", "Y", "enabled"]

notes:
  - >
    Course and Organization memberships use the same fields but different
    endpoints and key headers (external_course_key vs external_organization_key).
  - >
    primary_instructor is only valid for course roles that have the 'treat as
    instructor' flag enabled. A Y value on any other role type is silently rejected.
  - Deprecated fields (hascartridgeaccess, Image_URL) should be removed from any existing feeds.
