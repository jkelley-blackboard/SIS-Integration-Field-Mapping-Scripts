id: snapshot-flatfile-program
title: "Snapshot Flat File — Program"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Program
endpoint_slug: program
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Program object creates and manages academic programs in Blackboard Learn.
  Programs are persisted as courses with a Program service level in the
  underlying data model and can be associated with Subjects via the Program
  to Subject Association object.

endpoints:
  - operation: Store
    path: program/store
  - operation: Complete Refresh
    path: program/refresh
  - operation: Complete Refresh by Data Source
    path: program/refreshlegacy
  - operation: Delete
    path: program/delete

fields:
  - name: Batch Uid
    header: external_program_key
    required: true
    unique: true
    format: Max 64
    comment: Permanent, non-changing identifier for the Program.

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Program ID
    header: program_id
    required: true
    unique: true
    comment: >
      Short name used by the institution to uniquely identify the Program.
      Cannot be changed after creation.

  - name: Program Name
    header: program_name
    required: true
    unique: false
    format: Max 255
    multibyte: true
    comment: Complete title of the Program used for display.

  - name: Program Type
    header: program_type
    required: true
    unique: false
    values: "See program_type_values"
    comment: >
      Indicates the degree-level classification of the Program. Maps to the
      underlying course_type column.

  - name: Available
    header: available_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Establishes availability within Blackboard Learn.

  - name: Description
    header: description
    required: false
    unique: false
    format: No effective limit
    multibyte: true
    comment: Stored in the same underlying column as course description.

  - name: Replacement Batch Uid
    header: new_external_program_key
    required: false
    unique: true
    format: Max 64
    comment: Use only when a Program's EXTERNAL KEY must change.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.ProgramReplacementDataSourceBatchUid"

  - name: Row Status
    header: row_status
    required: false
    unique: false
    values: "'enabled' | 'disabled' | 'deleted'"
    comment: >
      enabled: normal access. disabled: visible but not editable.
      deleted: scheduled for removal.

value_tables:
  - id: program_type_values
    caption: Program Type Values
    columns: [Value, Description]
    rows:
      - ["U", "Undergraduate"]
      - ["G", "Graduate"]

sample:
  headers:
    - external_program_key
    - data_source_key
    - program_id
    - program_name
    - program_type
    - available_ind
    - row_status
  rows:
    - ["PROG-BSCS", "SIS-IMPORT-2025", "PROG.BSCS",
       "Bachelor of Science in Computer Science", "U", "Y", "enabled"]

notes:
  - >
    Programs are persisted as courses in Blackboard's data model with a Program
    service level. The /program/ endpoint sets this automatically — do not supply
    service_level in Program feeds.
  - >
    program_type maps to the underlying course_type column (U or G). The stored
    value is the single-character code.
  - program_id cannot be changed after creation.
