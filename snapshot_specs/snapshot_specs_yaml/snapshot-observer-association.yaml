id: snapshot-flatfile-observer-association
title: "Snapshot Flat File — Observer Association"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Observer Association
endpoint_slug: associateobserver
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Observer Association object links Observer-role users to Student-role
  users, granting the observer visibility into the student's courses and activity.

endpoints:
  - operation: Store
    path: associateobserver/store
  - operation: Complete Refresh
    path: associateobserver/refresh
  - operation: Complete Refresh by Data Source
    path: associateobserver/refreshlegacy
  - operation: Delete
    path: associateobserver/delete

fields:
  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Observed Student
    header: external_user_key
    required: true
    unique: false
    format: Max 64
    multibyte: true
    comment: >
      The external_person_key of the student being observed. Must have the
      Institution Role of Student.

  - name: Observer
    header: external_observer_key
    required: true
    unique: false
    format: Max 64
    multibyte: true
    comment: >
      The external_person_key of the observer. Must have the system role
      of Observer.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.AssociateObserverReplacementDataSourceBatchUid"

  - name: Row Status
    header: row_status
    required: false
    unique: false
    values: "'enabled' | 'disabled' | 'deleted'"
    comment: >
      enabled: normal access. disabled: visible but not editable.
      deleted: scheduled for removal.

sample:
  headers:
    - data_source_key
    - external_user_key
    - external_observer_key
    - row_status
  rows:
    - ["SIS-IMPORT-2025", "STU-100042", "OBS-200099", "enabled"]

notes:
  - >
    The observed user must have Institution Role of Student and the observer
    must have system role of Observer. Associations referencing users without
    the correct roles will fail.
