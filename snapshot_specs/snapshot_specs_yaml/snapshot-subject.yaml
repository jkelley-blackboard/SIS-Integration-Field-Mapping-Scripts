id: snapshot-flatfile-subject
title: "Snapshot Flat File — Subject"
published: "2026-04-22"
edited: "2026-04-22"
author: "Jeff Kelley, Principal Solutions Engineer, Blackboard Inc."

sis_object: Subject
endpoint_slug: subject
insert_update: Smart Insert or Update
delete_behavior: Disable
description: >
  The Subject object creates and manages curricular subjects in Blackboard Learn.
  Subjects represent discipline-level curriculum classifications and can be
  associated with Courses, Organizations, and Programs.

endpoints:
  - operation: Store
    path: subject/store
  - operation: Complete Refresh
    path: subject/refresh
  - operation: Complete Refresh by Data Source
    path: subject/refreshlegacy
  - operation: Delete
    path: subject/delete

fields:
  - name: Batch Uid
    header: external_subject_key
    required: true
    unique: true
    format: Max 64
    multibyte: true
    comment: >
      Letters, digits, dashes, and periods only — no spaces. Must be unique
      across all Subjects, Courses, and Organizations.

  - name: Data Source Key
    header: data_source_key
    required: true
    unique: false
    format: Max 256
    multibyte: true
    comment: May be supplied by the integration configuration rather than the file.

  - name: Subject ID
    header: subject_id
    required: true
    unique: true
    format: "Max 100, format: {Title}__{Identifier}"
    comment: >
      Two consecutive underscores separate title and identifier. Title: letters,
      numbers, hyphens, periods, underscores only. Identifier: letters and numbers
      only. No spaces. Example: CHEM__abc123. Cannot be changed after creation.

  - name: Subject Name
    header: subject_name
    required: true
    unique: false
    format: Max 255
    multibyte: true
    comment: Complete title of the Subject used for display.

  - name: Subject Type
    header: subject_type
    required: true
    unique: false
    values: "See subject_type_values"
    comment: Indicates the curricular classification of the Subject.

  - name: Available
    header: available_ind
    required: false
    unique: false
    values: "'Y' | 'N'"
    comment: Establishes availability within Blackboard Learn.

  - name: Description
    header: description
    required: false
    unique: false
    format: No effective limit
    multibyte: true

  - name: Replacement Batch Uid
    header: new_external_subject_key
    required: false
    unique: true
    format: Max 64
    multibyte: true
    comment: Use only when a Subject's EXTERNAL KEY must change.

  - name: Replacement Data Source Batch Uid
    header: new_data_source_key
    required: false
    unique: false
    comment: "UI mapping: script.flatfile.SubjectReplacementDataSourceBatchUid"

  - name: Row Status
    header: row_status
    required: false
    unique: false
    values: "'enabled' | 'disabled' | 'deleted'"
    comment: >
      enabled: normal access. disabled: visible but not editable.
      deleted: scheduled for removal.

value_tables:
  - id: subject_type_values
    caption: Subject Type Values
    columns: [Value, Description]
    rows:
      - ["U", "Undergraduate"]
      - ["G", "Graduate"]
      - ["D", "Developmental / Remedial"]
      - ["N", "Undergraduate Non-Transferable"]
      - ["T", "Undergraduate Transferable"]
      - ["P", "Professional / Continuing Education"]

sample:
  headers:
    - external_subject_key
    - data_source_key
    - subject_id
    - subject_name
    - subject_type
    - available_ind
    - row_status
  rows:
    - ["CHEM-SUBJ", "SIS-IMPORT-2025", "CHEM__abc123", "Chemistry", "U", "Y", "enabled"]

notes:
  - subject_id cannot be changed after creation.
  - >
    subject_id format requires two consecutive underscores separating the title
    portion and the identifier portion (e.g. CHEM__abc123).
  - >
    external_subject_key must be unique across all Subjects, Courses, and
    Organizations — not just within Subjects.
