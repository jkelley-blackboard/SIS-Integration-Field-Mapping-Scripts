- id: subject
  title: Subject
  icon: 🎓
  sis_object: Subject
  insert_update: Smart Inserts or Updates
  delete_behavior: Disable
  summary: 'Defines academic subjects with curricular classification type for use
    within the learning management system.

    '
  fields:
  - name: Batch Uid
    required: true
    unique: true
    header: external_subject_key
    description: 'Short name to uniquely identify the Subject. Not displayed to users.
      Must be unique across all Subjects, Courses, and Organizations. Can contain
      only letters, digits, dashes, and periods. Often the same as the Subject ID.

      '
    format: Max length 64. Multi-byte characters accepted.
  - name: Subject ID
    required: true
    unique: true
    header: subject_id
    description: 'Short name used to uniquely identify the Subject. Must follow the
      format {SubjectTitle}__{SubjectIdentifier} (two consecutive underscores). Title
      may contain letters, numbers, hyphens, periods, and underscores. Identifier
      may contain letters and numbers only. Cannot be changed after creation.

      '
    format: 'Max length 100. Characters NOT allowed: space, &, /, '', +. Example:
      CHEM__abc123'
  - name: Subject Name
    required: true
    unique: false
    header: subject_name
    description: Complete title of the Subject used for display.
    format: Max length 255. Multi-byte characters accepted.
  - name: Data Source Key
    required: true
    unique: false
    header: data_source_key
    description: 'Key used to establish grouping of Subject elements. May be provided
      by the integration configuration.

      '
    format: Max length 256. Multi-byte characters accepted.
  - name: Subject Type
    required: true
    unique: false
    header: subject_type
    description: Curricular classification of the Subject within the learning management
      system.
    values:
    - U — Undergraduate
    - G — Graduate
    - D — Developmental / Remedial
    - N — Undergraduate Non-Transferable
    - T — Undergraduate Transferable
    - P — Professional / Continuing Education
  - name: Available
    required: false
    unique: false
    header: available_ind
    description: Establishes Subject availability within Blackboard.
    values:
    - Y
    - N
  - name: Description
    required: false
    unique: false
    header: description
    description: Complete description of the Subject.
    format: Max length 4000. Multi-byte characters accepted.
  - name: Replacement Batch Uid
    required: false
    unique: true
    header: new_external_subject_key
    description: Used only on the rare occasions when a Subject's EXTERNAL KEY changes.
    format: Max length 64. Must be unique. Multi-byte characters accepted.
  - name: Replacement Data Source Batch Uid
    required: false
    unique: false
    header: new_data_source_key
    description: 'Replaces the existing data source grouping for this subject. UI
      mapping field: script.flatfile.SubjectReplacementDataSourceBatchUid.

      '
  - name: Row Status
    required: false
    unique: false
    header: row_status
    description: Sets the availability state of the record.
    values:
    - enabled
    - disabled
    - deleted
  notes: "Identifiers:\n  - subject_id uses the {Title}__{Identifier} format; cannot\
    \ change after creation.\nDelete behavior:\n  - Default delete behavior is Disable;\
    \ use row_status."
