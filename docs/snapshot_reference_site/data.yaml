entities:
- id: user
  title: User
  icon: 👤
  sis_object: Person
  insert_update: Smart Inserts or Updates
  delete_behavior: Disable
  summary: 'Manages user accounts including identity, contact info, authentication,
    and institutional roles.

    '
  fields:
  - name: Batch Uid
    required: true
    unique: true
    header: external_person_key
    description: 'A unique identifier for a user at the institution. Provided by the
      institution; not displayed to users. Strongly recommended to be a permanent,
      non-changing ID (e.g., a permanent Student ID). The database cannot merge data
      between distinct accounts.

      '
    format: Max length 64
  - name: Data Source Key
    required: true
    unique: false
    header: data_source_key
    description: 'Key used to establish grouping of user elements. May be provided
      by the integration configuration — if so, it is not required in the file.

      '
    format: Max length 256. Multi-byte characters accepted.
  - name: First Name
    required: true
    unique: false
    header: firstname
    description: The user's given first name.
    format: Max length 100. Multi-byte characters accepted.
  - name: Last Name
    required: true
    unique: false
    header: lastname
    description: The user's family/last name.
    format: Max length 100. Multi-byte characters accepted.
  - name: Username
    required: true
    unique: true
    header: user_id
    description: The username used to log into Blackboard. Must be unique across the
      system.
    format: Max length 50. Multi-byte characters accepted.
  - name: Available
    required: false
    unique: false
    header: available_ind
    description: 'User account availability. If set to N, the account appears grayed
      to Admins and Instructors, and the user cannot log in.

      '
    values:
    - Y
    - N
  - name: Birthdate
    required: false
    unique: false
    header: birthdate
    description: The user's birth date.
    format: yyyymmdd
  - name: City
    required: false
    unique: false
    header: city
    description: City name corresponding to the user's address.
    format: Max length 50. Multi-byte characters accepted.
  - name: Company
    required: false
    unique: false
    header: company
    description: Name of the company for which the user works.
    format: Max length 100. Multi-byte characters accepted.
  - name: Country
    required: false
    unique: false
    header: country
    description: Country name corresponding to the user's address.
    format: Max length 50. Multi-byte characters accepted.
  - name: Department
    required: false
    unique: false
    header: department
    description: Name of the department or sub-section where the user works.
    format: Max length 100. Multi-byte characters accepted.
  - name: Domain Name
    required: false
    unique: false
    header: domain_name
    description: 'Hostname of the brand used for notification emails before the user
      logs in. Must be one of the configured hostnames; invalid values are ignored
      without warning. Set at insert only — updates are ignored.

      '
    format: 'Max length 255. Example: blackboard.college.edu'
  - name: Education Level
    required: false
    unique: false
    header: educ_level
    description: Highest level of education achieved by the user.
    values:
    - K-8
    - high school
    - freshman
    - sophomore
    - junior
    - senior
    - graduate school
    - post-graduate school
  - name: Email
    required: false
    unique: false
    header: email
    description: 'Email address of the user. Blackboard recommends this not be null
      — users without an email address cannot send email.

      '
    format: Max length 100.
  - name: Gender
    required: false
    unique: false
    header: gender
    description: The gender of the user.
    values:
    - Not Disclosed
    - Male
    - Female
  - name: Home Phone
    required: false
    unique: false
    header: h_phone_1
    description: The user's home phone number.
    format: Max length 50. Multi-byte characters accepted.
  - name: Home Phone (Secondary)
    required: false
    unique: false
    header: h_phone_2
    description: An additional home phone number associated with the user.
    format: Max length 50. Multi-byte characters accepted.
  - name: Institution Email
    required: false
    unique: true
    header: inst_email
    description: 'Institution email address. Can be set to Null. No email communications
      are sent to inst_email.

      '
    format: Max length 254.
  - name: Job Title
    required: false
    unique: false
    header: job_title
    description: The associated job title for the user.
    format: Max length 100. Multi-byte characters accepted.
  - name: Middle Name
    required: false
    unique: false
    header: middlename
    description: The user's given middle name.
    format: Max length 100. Multi-byte characters accepted.
  - name: Mobile Phone
    required: false
    unique: false
    header: m_phone
    description: The user's mobile phone or pager number.
    format: Max length 50. Multi-byte characters accepted.
  - name: Name Pronunciation
    required: false
    unique: false
    header: pronunciation
    description: Phonetic spelling or pronunciation guide for the user's name.
    format: Max length 1000. Multi-byte characters accepted.
  - name: Other Name
    required: false
    unique: false
    header: othername
    description: The user's alternate preferred name.
    format: Max length 100.
  - name: Password
    required: false
    unique: false
    header: passwd
    description: 'Password used to log into Blackboard. If not provided, Learn auto-populates
      with a SHA-512 password for security.

      '
    format: Max length 32. Multi-byte characters accepted.
  - name: Password Encryption Type
    required: false
    unique: false
    header: pwencryptiontype
    description: Sets the password encryption type used to encrypt the password in
      the database.
    values:
    - MD5
    - SSHA
  - name: Primary Institution Role
    required: false
    unique: false
    header: institution_role
    description: 'The user''s Primary Institution Role, which determines the user''s
      view of Portal Modules. See Manage Institution Roles in the System Admin panel
      for valid values on your system.

      '
  - name: Pronouns
    required: false
    unique: false
    header: pronouns
    description: The user's pronouns. Multiple values accepted using comma as delimiter.
    format: Max length 1000.
  - name: Replacement Batch Uid
    required: false
    unique: true
    header: new_external_person_key
    description: Used only on the rare occasions when a user's EXTERNAL_PERSON_KEY
      changes.
    format: Max length 64. Multi-byte characters accepted.
  - name: Row Status
    required: false
    unique: false
    header: row_status
    description: Sets the availability state of the record.
    values:
    - enabled
    - disabled
    - deleted
    format: Max length 64.
  - name: State/Province
    required: false
    unique: false
    header: state
    description: State or province corresponding to the user's address.
    format: Max length 50. Multi-byte characters accepted.
  - name: Street 1
    required: false
    unique: false
    header: street_1
    description: First line of the user's address.
    format: Max length 100. Multi-byte characters accepted.
  - name: Street 2
    required: false
    unique: false
    header: street_2
    description: Second line of the user's address.
    format: Max length 100. Multi-byte characters accepted.
  - name: Student ID
    required: false
    unique: false
    header: student_id
    description: Generic identifier field. Display only — not used for authentication
      or lookups.
    format: Max length 100. Multi-byte characters accepted.
  - name: Suffix
    required: false
    unique: false
    header: suffix
    description: The user's name suffix.
    format: Max length 100. Multi-byte characters accepted.
  - name: System Role
    required: false
    unique: false
    header: system_role
    description: 'User''s administrative role describing the level of system administration
      privilege. Defaults to "none" if not specified. Custom roles can be matched
      by Role ID from Administrator Panel > System Roles.

      '
    values:
    - account_admin / accountadmin / user_admin
    - system_support / syssupport
    - course_creator / creator
    - course_support / support
    - guest
    - none
    - observer
    - portal_admin / portal
    - sys_admin / sysadmin / system_admin
    - ecommerce_admin
    - card_office_admin
    - store_admin
  - name: Title
    required: false
    unique: false
    header: title
    description: The title that the user prefers to use.
    format: Max length 100. Multi-byte characters accepted.
  - name: Website
    required: false
    unique: false
    header: webpage
    description: URL of the user's personal web page.
    format: Max length 100.
  - name: Work Phone
    required: false
    unique: false
    header: b_phone_1
    description: The work phone number associated with the user.
    format: Max length 50. Multi-byte characters accepted.
  - name: Work Phone (Secondary)
    required: false
    unique: false
    header: b_phone_2
    description: An additional work phone number associated with the user.
    format: Max length 50. Multi-byte characters accepted.
  - name: Zip/Postal Code
    required: false
    unique: false
    header: zip_code
    description: The user's ZIP or Postal Code.
    format: Max length 50. Multi-byte characters accepted.
  - name: Home Fax
    required: false
    unique: false
    header: h_fax
    description: The user's home fax number.
    format: Max length 50. Multi-byte characters accepted.
  - name: Work Fax
    required: false
    unique: false
    header: b_fax
    description: The work fax number associated with the user.
    format: Max length 50. Multi-byte characters accepted.
  notes: "Secondary Institution Roles:\n  - Appears in Learn mapping UI but is not\
    \ a User flat-file column.\n  - Provide secondary roles via the Secondary Institution\
    \ Role Association file (headers: role_id, external_person_key).\nDelete behavior\
    \ & availability:\n  - Default delete behavior is Disable (use row_status)."
- id: course-organization
  title: Course / Organization
  icon: 📚
  sis_object: Course or Organization
  insert_update: Smart Inserts or Updates
  delete_behavior: Disable
  summary: 'Defines courses and organizations including enrollment settings, duration,
    availability, quotas, and catalog visibility.

    '
  fields:
  - name: Batch Uid
    required: true
    unique: true
    header: external_course_key / external_organization_key
    description: 'A unique identifier for the course or organization at the institution.
      Not displayed to users.

      '
    format: Max length 64.
  - name: Course ID or Organization ID
    required: true
    unique: true
    header: course_id / organization_id
    description: 'Short name used to uniquely identify the Course or Organization
      (e.g., math101_F99 or ChessClub). Must be unique and cannot be changed.

      '
    format: 'Max length 100. Characters NOT allowed: space, &, /, '', +'
  - name: Course Name or Organization Name
    required: true
    unique: false
    header: course_name / organization_name
    description: Complete title of the Course or Organization used for display.
    format: Max length 255. Multi-byte characters accepted.
  - name: Data Source Key
    required: true
    unique: false
    header: data_source_key
    description: 'Key used to establish grouping of course/org elements. May be provided
      by the integration configuration — if so, not required in the file.

      '
    format: Max length 256. Multi-byte characters accepted.
  - name: Allow Guests
    required: false
    unique: false
    header: allow_guest_ind
    description: Allows guest access to the Course or Organization.
    values:
    - Y
    - N
  - name: Allow Observers
    required: false
    unique: false
    header: allow_observer_ind
    description: Allows observer access to the Course or Organization.
    values:
    - Y
    - N
  - name: Available
    required: false
    unique: false
    header: available_ind
    description: 'Course or Organization availability. If set to N, the course appears
      grayed to Admins and Instructors and students cannot access it.

      '
    values:
    - Y
    - N
  - name: Days of Use
    required: false
    unique: false
    header: days_of_use
    description: 'Number of days Students may access the Course after enrollment.
      Useful for self-paced learning. Only applied when Duration is set to D (Fixed).

      '
    format: Numeric. e.g., 120
  - name: Description Page
    required: false
    unique: false
    header: desc_page_ind
    deprecated: true
    description: Currently not supported. Integrations should not use this field.
    note: Not supported — do not use.
  - name: Duration
    required: false
    unique: false
    header: duration
    description: Schedules the course availability window.
    values:
    - C — Continuous (always accessible)
    - R — Range (between Start Date and End Date)
    - D — Fixed (number of Days of Use from enrollment)
    - T — Term-dictated
  - name: End Date
    required: false
    unique: false
    header: end_date
    description: Date the course stops being available.
    format: yyyymmdd
  - name: Enrollment End Date
    required: false
    unique: false
    header: enroll_end
    description: Date that enrollment is no longer available to Students.
    format: yyyymmdd
  - name: Enrollment Start Date
    required: false
    unique: false
    header: enroll_start
    description: Date that enrollment may begin.
    format: yyyymmdd
  - name: Enrollment Type
    required: false
    unique: false
    header: enroll_option
    description: Determines the enrollment method for the course.
    values:
    - instructor
    - self
    - email
  - name: Fee
    required: false
    unique: false
    header: fee
    description: Fee associated with this Course or Organization.
    format: Numeric. 11 characters, 2 decimal places. e.g., 1500.00
  - name: Institution Name
    required: false
    unique: false
    header: institution_name
    description: The name of the institution associated with this course.
    format: Max length 255. Multi-byte characters accepted.
  - name: Language Pack
    required: false
    unique: false
    header: locale
    description: Identifier for the preferred language pack.
    format: xx_XX format. e.g., fr_FR for French. Max length 20.
  - name: Locked Out
    required: false
    unique: false
    header: lockout_ind
    description: 'Restricts access to the Course or Organization based on the Start
      Date and End Date when set to Y.

      '
    values:
    - Y
    - N
  - name: Maximum Disk Usage (soft limit)
    required: false
    unique: false
    header: soft_limit
    description: 'Soft quota that triggers warning emails when course folder storage
      reaches this value. Only applies when course quotas are in effect.

      '
    format: Numeric bytes. e.g., 10485760 = 10MB
  - name: Primary Node Batch Uid
    required: false
    unique: false
    header: primary_external_node_key
    description: Designates the primary institutional hierarchy node for this course
      or organization.
  - name: Replacement Batch Uid
    required: false
    unique: true
    header: new_external_course_key / new_external_organization_key
    description: Used only on the rare occasions when a Course or Organization's EXTERNAL
      KEY changes.
    format: Max length 64.
  - name: Replacement Data Source Batch Uid
    required: false
    unique: false
    header: new_data_source_key
    description: 'Replaces the existing data source grouping for this course or organization.
      UI mapping field: script.flatfile.CourseReplacementDataSourceBatchUid.  # Fixed:
      was incorrectly referencing User mapping key

      '
  - name: Row Status
    required: false
    unique: false
    header: row_status
    description: Sets the availability state of the record.
    values:
    - enabled
    - disabled
    - deleted
  - name: Service Level Type
    required: false
    unique: false
    header: service_level
    description: 'Specifies the type of course. Not typically used in data feeds.

      '
    values:
    - F — Full (Course)
    - C — Community (Organization)
    - S — System (limited functions)
    - R — Registered (unused)
    - T — Test Drive (unused)
  - name: Show In Catalog
    required: false
    unique: false
    header: catalog_ind
    description: Whether the Course or Organization appears in the course catalog.
    values:
    - Y
    - N
  - name: Source Course / Organization Copy Key
    required: false
    unique: false
    header: template_course_key / template_organization_key
    description: External key of the content source used for copy operations.
    format: Max length 64. Multi-byte characters accepted.
  - name: Start Date
    required: false
    unique: false
    header: start_date
    description: Date the course becomes available.
    format: yyyymmdd
  - name: Term Association
    required: false
    unique: false
    header: external_term_key
    description: 'Associates the course with a Term. The value must match the external_term_key
      of an existing term in the system.

      '
    format: Max length 256.
  notes: "Term & hierarchy tips:\n  - Term linkage uses external_term_key and must\
    \ match an existing Term.\n  - Primary Node link is optional (primary_external_node_key).\n\
    Delete behavior:\n  - Default delete behavior is Disable; use row_status for soft\
    \ deletes."
- id: membership
  title: Course and Organization Membership
  icon: 🔗
  sis_object: Course or Organization Memberships (Enrollments and Staff Assignments)
  insert_update: Smart Inserts or Updates
  delete_behavior: Disable
  summary: 'Enrollments and staff assignments linking users to courses or organizations.
    Includes role, availability, roster, and personal info.

    '
  entity_note: 'Courses and Organizations require the same fields. The header name
    is specific to whether a course or organization is being processed — note the
    differences when constructing data feeds.

    '
  fields:
  - name: Course Batch Uid or Organization Batch Uid
    required: true
    unique: false
    header: external_course_key / external_organization_key
    description: The external key used to identify the Course or Organization.
    format: Max length 64. Multi-byte characters accepted.
  - name: Data Source Key
    required: true
    unique: false
    header: data_source_key
    description: 'Key used to establish grouping of membership elements. May be provided
      by the integration configuration.

      '
    format: Max length 256.
  - name: User Batch Uid
    required: true
    unique: false
    header: external_person_key
    description: The external_person_key used to identify the user to enroll.
    format: Max length 64. Multi-byte characters accepted.
  - name: Available
    required: false
    unique: false
    header: available_ind
    description: Establishes enrollment availability in Blackboard Learn.
    values:
    - Y
    - N
  - name: Has Cartridge Access
    required: false
    unique: false
    header: hascartridgeaccess
    deprecated: true
    description: Not supported and targeted for removal. Do not use.
    note: Targeted for removal — do not use in new integrations.
  - name: Image URL
    required: false
    unique: false
    header: Image_URL
    deprecated: true
    description: Not supported and targeted for removal. Do not use.
    note: Targeted for removal — do not use in new integrations.
  - name: Include In Roster
    required: false
    unique: false
    header: roster_ind
    description: Flag indicating whether the user is displayed in the course roster.
    values:
    - Y
    - N
  - name: Introduction
    required: false
    unique: false
    header: intro
    description: Introduction text for the User Home Page within the Course.
    format: Max length 4000. Multi-byte characters accepted.
  - name: Notes
    required: false
    unique: false
    header: notes
    description: Information pertinent to this user that may impact course or organization
      participation.
    format: Not limited. Multi-byte characters accepted.
  - name: Personal Information
    required: false
    unique: false
    header: pinfo
    description: Personal information displayed on the User Home Page within the Course.
    format: Not limited. Multi-byte characters accepted.
  - name: Primary Instructor
    required: false
    unique: false
    header: primary_instructor
    description: 'Indicates this membership is the primary instructor. The member
      must have a course role with the "treat as instructor" flag set. A value of
      Y is rejected if the assigned course role does not have this flag.

      '
    values:
    - Y
    - N
  - name: Receive Email
    required: false
    unique: false
    header: receive_email_ind
    description: Flag controlling whether email is enabled for this user in this course.
    values:
    - Y
    - N
  - name: Replacement Data Source Batch Uid
    required: false
    unique: false
    header: new_data_source_key
    description: 'Replaces the existing data source grouping for this membership record.
      UI mapping field: script.flatfile.MemberReplacementDataSourceBatchUid.

      '
  - name: Role
    required: false
    unique: false
    header: role
    description: The user's role in the Course or Organization.
    values:
    - Instructor
    - teaching_assistant
    - course_builder
    - Grader
    - Student
    - guest
    - none
  - name: Row Status
    required: false
    unique: false
    header: row_status
    description: Sets the availability state of the membership record.
    values:
    - enabled
    - disabled
    - deleted
  - name: Website 1 Description
    required: false
    unique: false
    header: link_description_1
    description: Description for user website link 1.
    format: Max length 255.
  - name: Website 1 Name
    required: false
    unique: false
    header: link_name_1
    description: Display name for user website link 1.
    format: Max length 100.
  - name: Website 1 URL
    required: false
    unique: false
    header: link_url_1
    description: URL for user website link 1.
    format: Max length 100.
  - name: Website 2 Description
    required: false
    unique: false
    header: link_description_2
    description: Description for user website link 2.
    format: Max length 255.
  - name: Website 2 Name
    required: false
    unique: false
    header: link_name_2
    description: Display name for user website link 2.
    format: Max length 100.
  - name: Website 2 URL
    required: false
    unique: false
    header: link_url_2
    description: URL for user website link 2.
    format: Max length 100.
  - name: Website 3 Description
    required: false
    unique: false
    header: link_description_3
    description: Description for user website link 3.
    format: Max length 255.
  - name: Website 3 Name
    required: false
    unique: false
    header: link_name_3
    description: Display name for user website link 3.
    format: Max length 100.
  - name: Website 3 URL
    required: false
    unique: false
    header: link_url_3
    description: URL for user website link 3.
    format: Max length 100.
  notes: "Course vs Organization headers:\n  - Headers switch between course and organization\
    \ variants (external_course_key / external_organization_key).\nRoster/visibility:\n\
    \  - roster_ind controls whether the user appears in the roster.\nDelete behavior:\n\
    \  - Default delete behavior is Disable; use row_status."
- id: terms
  title: Terms
  icon: 📅
  sis_object: Term
  insert_update: Smart Inserts or Updates
  delete_behavior: Disable
  summary: 'Defines academic terms with availability windows, start/end dates, and
    duration modes (continuous, range, or fixed).

    '
  fields:
  - name: Batch Uid
    required: true
    unique: true
    header: external_term_key
    description: 'Short name used to uniquely identify the Term. Not displayed to
      users. Can contain only letters, digits, dashes, and periods — no spaces or
      other punctuation.

      '
    format: Max length 256. Multi-byte characters accepted.
  - name: Data Source Key
    required: true
    unique: false
    header: data_source_key
    description: 'Key used to establish grouping of Term elements. May be provided
      by the integration configuration.

      '
    format: Max length 256.
  - name: Name
    required: true
    unique: false
    header: name
    description: Display name of the term.
    format: Max length 333.
  - name: Available
    required: false
    unique: false
    header: available_ind
    description: 'Determines Term availability. If set to N, objects associated with
      this term will not be available.

      '
    values:
    - Y
    - N
  - name: Days of Use
    required: false
    unique: false
    header: days_of_use
    description: 'Number of days Students may access the Course after enrollment.
      Used when Duration is set to Fixed.

      '
    format: Numeric.
  - name: Description
    required: false
    unique: false
    header: description
    description: Description of the Term.
  - name: Duration
    required: false
    unique: false
    header: duration
    description: Schedules the term availability window.
    values:
    - Continuous — always accessible
    - Range — between Start Date and End Date
    - Fixed — set number of Days of Use
  - name: End Date
    required: false
    unique: false
    header: end_date
    description: Date the term stops being available.
    format: yyyymmdd
  - name: Start Date
    required: false
    unique: false
    header: start_date
    description: Date the term begins being available.
    format: yyyymmdd
  - name: Replacement Batch Uid
    required: false
    unique: true
    header: new_external_term_key
    description: Used only on the rare occasions when a term's EXTERNAL KEY changes.
    format: Max length 256. Multi-byte characters accepted.
  - name: Replacement Data Source Batch Uid
    required: false
    unique: false
    header: new_data_source_key
    description: 'Replaces the existing data source grouping for this term. UI mapping
      field: script.flatfile.TermReplacementDataSourceBatchUid.

      '
  - name: Row Status
    required: false
    unique: false
    header: row_status
    description: Sets the availability state of the record.
    values:
    - enabled
    - disabled
    - deleted
  notes: "Duration modes:\n  - Continuous, Range (start/end), or Fixed (days_of_use).\n\
    Delete behavior:\n  - Default delete behavior is Disable; use row_status."
- id: secondary-institution-role
  title: Secondary Institution Role Association
  icon: 🏷️
  sis_object: User Secondary Institution Role
  insert_update: Smart Inserts or Updates
  delete_behavior: Disable
  summary: 'Associates users with secondary institution roles beyond their primary
    role assignment.

    '
  fields:
  - name: Data Source Key
    required: true
    unique: false
    header: data_source_key
    description: Key used to establish grouping of user elements.
    format: Max length 256.
  - name: Secondary Institution Role Id
    required: true
    unique: false
    header: role_id
    description: The identifier for the secondary institution role for this association.
  - name: User Batch Uid
    required: true
    unique: false
    header: external_person_key
    description: The user external_person_key (batch_uid) to be used for this association.
    format: Max length 64.
